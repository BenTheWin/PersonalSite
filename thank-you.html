<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent — Benjamin Stone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #9333EA;
      --cream:  #F0EAD6;
      --green:  #16A34A;
      --black:  #111111;
      --white:  #FFFFFF;
      --border: 3px solid var(--black);
      --font-display: 'Bebas Neue', 'Arial Black', sans-serif;
      --font-ui:      'Archivo Black', 'Arial Black', sans-serif;
      --font-body:    'Figtree', Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--black);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--white);
      border: var(--border);
      border-radius: 12px;
      box-shadow: 6px 6px 0 var(--black);
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .card__icon {
      width: 72px;
      height: 72px;
      background: var(--green);
      border: var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .card__icon svg {
      width: 36px;
      height: 36px;
      stroke: var(--white);
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card__headline {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 8vw, 4rem);
      line-height: 1;
      letter-spacing: 0.02em;
      margin-bottom: 16px;
    }

    .card__headline em {
      color: var(--purple);
      font-style: normal;
    }

    .card__body {
      font-size: 1.05rem;
      color: #444;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-block;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 14px 32px;
      background: var(--purple);
      color: var(--white);
      border: var(--border);
      border-radius: 6px;
      box-shadow: 4px 4px 0 var(--black);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--black);
    }

    @media (max-width: 480px) {
      .card {
        padding: 40px 28px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__icon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1 class="card__headline">Message<br><em>Sent!</em></h1>
    <p class="card__body">Thanks for reaching out — I'll get back to you as soon as I can.</p>
    <a href="index.html" class="btn">Back to Home</a>
  </div>
</body>
</html>
